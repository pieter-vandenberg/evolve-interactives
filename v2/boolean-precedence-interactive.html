<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boolean precedence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF5EC;--panel:#FFFDF8;--ink:#211C17;--ink-soft:#6E665A;
    --line:#E6DCC9;--line-strong:#D3C6AC;--accent:#BC4326;--accent-soft:#F4DDD2;
    --true:#2F6B4F;--true-soft:#DCEFE4;--false:#8A5A2B;--false-soft:#F1E4D2;
    --radius:14px;--mono:'IBM Plex Mono',ui-monospace,monospace;--sans:'DM Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:620px;margin:0 auto;padding:20px}
  .stage{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px}

  .siglabel{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin:0 0 10px}

  /* INPUT: tappable code-like comparison chips */
  .chips{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
  .chip{display:flex;align-items:center;justify-content:space-between;gap:12px;font-family:var(--mono);font-size:15px;border:1.5px solid var(--line-strong);background:#fff;border-radius:10px;padding:11px 14px;cursor:pointer;transition:.15s;width:100%;text-align:left;color:var(--ink)}
  .chip .tv{font-weight:600;font-size:13px;padding:2px 9px;border-radius:6px}
  .chip[data-v="true"]{border-color:var(--true)}
  .chip[data-v="true"] .tv{background:var(--true-soft);color:var(--true)}
  .chip[data-v="false"]{border-color:var(--line-strong)}
  .chip[data-v="false"] .tv{background:var(--false-soft);color:var(--false)}

  .parenToggle{display:inline-flex;align-items:center;gap:9px;font-size:13.5px;font-weight:500;border:1.5px solid var(--line-strong);background:#fff;border-radius:999px;padding:8px 14px;cursor:pointer;transition:.15s;margin-bottom:22px}
  .parenToggle.on{border-color:var(--accent);background:var(--accent-soft)}
  .parenToggle input{accent-color:var(--accent);width:15px;height:15px}

  /* OUTPUT */
  .divider{border:0;border-top:1px solid var(--line);margin:4px 0 18px}
  .expr{font-family:var(--mono);font-size:clamp(14px,3.2vw,17px);line-height:2;text-align:center;margin-bottom:14px}
  .expr .grp{background:var(--accent-soft);border-radius:6px;padding:3px 7px;white-space:nowrap}
  .expr .op{color:var(--accent);font-weight:600}
  .expr .sub{font-size:12px;font-weight:700;padding:1px 7px;border-radius:6px;margin-left:4px;vertical-align:middle}
  .sub.t{background:var(--true-soft);color:var(--true)}.sub.f{background:var(--false-soft);color:var(--false)}
  .result{text-align:center}
  .result .word{font-family:var(--mono);font-size:clamp(30px,7vw,44px);font-weight:600;line-height:1}
  .result .word.t{color:var(--true)}.result .word.f{color:var(--false)}

  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);border:0}
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:3px;border-radius:8px}
  @media (prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="sr-only">Interactive: boolean operator precedence. Tap each comparison to flip it between True and False, and toggle parentheses, to see how Python groups and and or.</h1>
  <div class="stage">
    <!-- INPUT (controls first) -->
    <p class="siglabel">Input — tap to flip each</p>
    <div class="chips">
      <button class="chip" id="A" data-v="true" type="button" aria-pressed="true"><span>name == 'Steven'</span><span class="tv">True</span></button>
      <button class="chip" id="B" data-v="false" type="button" aria-pressed="false"><span>name == 'Carol'</span><span class="tv">False</span></button>
      <button class="chip" id="C" data-v="false" type="button" aria-pressed="false"><span>age &lt;= 30</span><span class="tv">False</span></button>
    </div>
    <label class="parenToggle" id="pWrap"><input type="checkbox" id="paren"> add parentheses around the <code>or</code></label>

    <hr class="divider">

    <!-- OUTPUT -->
    <p class="siglabel">Result</p>
    <div class="expr" id="expr"></div>
    <div class="result"><span class="word" id="word">—</span></div>

    <p class="sr-only" id="status" role="status" aria-live="polite"></p>
  </div>
</div>

<script>
(function(){
  const el=id=>document.getElementById(id);
  const st={A:true,B:false,C:false,paren:false};
  const tf=v=>v?'True':'False';
  const sub=v=>`<span class="sub ${v?'t':'f'}">${tf(v)}</span>`;

  function flip(k){st[k]=!st[k];const b=el(k);b.dataset.v=st[k];b.setAttribute('aria-pressed',st[k]);b.querySelector('.tv').textContent=tf(st[k]);render();}
  ['A','B','C'].forEach(k=>el(k).addEventListener('click',()=>flip(k)));
  el('paren').addEventListener('change',e=>{st.paren=e.target.checked;el('pWrap').classList.toggle('on',st.paren);render();});

  function render(){
    const {A,B,C,paren}=st;
    let result;
    if(!paren){
      const bc=B&&C; result=A||bc;
      el('expr').innerHTML=
        `name=='Steven' <span class="op">or</span> <span class="grp">(name=='Carol' <span class="op">and</span> age&lt;=30)${sub(bc)}</span>`;
    }else{
      const ab=A||B; result=ab&&C;
      el('expr').innerHTML=
        `<span class="grp">(name=='Steven' <span class="op">or</span> name=='Carol')${sub(ab)}</span> <span class="op">and</span> age&lt;=30`;
    }
    el('word').textContent=tf(result);
    el('word').className='word '+(result?'t':'f');
    el('status').textContent=`The expression evaluates to ${tf(result)}.`;
  }
  render();
})();
</script>
</body>
</html>
