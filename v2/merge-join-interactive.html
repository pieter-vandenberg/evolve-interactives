<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merge join</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF5EC;--panel:#FFFDF8;--ink:#211C17;--ink-soft:#6E665A;
    --line:#E6DCC9;--line-strong:#D3C6AC;--accent:#BC4326;--accent-soft:#F4DDD2;
    --radius:14px;--mono:'IBM Plex Mono',ui-monospace,monospace;--sans:'DM Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:680px;margin:0 auto;padding:20px}
  .stage{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px}

  .siglabel{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin:0 0 9px}

  /* control first */
  .seg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  .seg button{flex:1 1 auto;font-family:var(--mono);font-weight:600;font-size:15px;border:1.5px solid var(--line-strong);background:#fff;color:var(--ink);border-radius:10px;padding:12px 10px;cursor:pointer;transition:.15s}
  .seg button[aria-pressed="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .expr{font-family:var(--mono);font-size:13px;background:#211C17;color:#F4ECDD;border-radius:9px;padding:11px 13px;margin:14px 0 22px;overflow-x:auto}
  .expr .p{color:#E8A88F}

  table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12.5px}
  caption{font-family:var(--sans);font-weight:600;text-align:left;font-size:12.5px;color:var(--ink-soft);margin-bottom:6px}
  th,td{border:1px solid var(--line);padding:6px 9px;text-align:left}
  th{background:var(--accent-soft);font-weight:600;white-space:nowrap}
  td.nan{color:var(--ink-soft);font-style:italic;background:repeating-linear-gradient(135deg,#fff,#fff 5px,#f3ead9 5px,#f3ead9 7px)}

  .inputs{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
  .result-cap{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:6px}
  .result-cap .count{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}

  .reset{display:block;margin:20px auto 0;font-family:var(--sans);font-weight:600;font-size:13px;border:1.5px solid var(--line-strong);background:transparent;color:var(--ink-soft);border-radius:999px;padding:7px 16px;cursor:pointer;transition:.15s}
  .reset:hover{border-color:var(--ink);color:var(--ink)}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);border:0}
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:3px;border-radius:8px}
  @media (max-width:600px){.inputs{grid-template-columns:1fr}}
  @media (prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="sr-only">Interactive: merging two DataFrames. Choose a join type with the how argument and see which rows the merged result keeps.</h1>
  <div class="stage">
    <!-- CONTROL FIRST -->
    <p class="siglabel">how =</p>
    <div class="seg" id="seg" role="group" aria-label="Join type">
      <button data-how="inner" type="button" aria-pressed="true">'inner'</button>
      <button data-how="outer" type="button" aria-pressed="false">'outer'</button>
      <button data-how="left" type="button" aria-pressed="false">'left'</button>
      <button data-how="right" type="button" aria-pressed="false">'right'</button>
    </div>
    <div class="expr" id="expr"></div>

    <!-- INPUTS -->
    <div class="inputs">
      <table id="leftT"><caption>first_pupil_df</caption><thead><tr><th>author</th><th>title_x</th></tr></thead><tbody></tbody></table>
      <table id="rightT"><caption>second_pupil_df</caption><thead><tr><th>author</th><th>title_y</th></tr></thead><tbody></tbody></table>
    </div>

    <!-- RESULT -->
    <div class="result-cap"><span class="siglabel" style="margin:0">result</span><span class="count" id="count"></span></div>
    <table id="resT"><thead><tr><th>author</th><th>title_x</th><th>title_y</th></tr></thead><tbody></tbody></table>

    <button class="reset" id="reset" type="button">Reset</button>
    <p class="sr-only" id="status" role="status" aria-live="polite"></p>
  </div>
</div>

<script>
(function(){
  const left=[['Alcott','Little Women'],['Fitzgerald','The Great Gatsby'],['Steinbeck','Of Mice and Men'],['Twain','Tom Sawyer'],['Hemingway','The Old Man and the Sea']];
  const right=[['Steinbeck','East of Eden'],['Twain','Huckleberry Finn'],['Hemingway','For Whom the Bell Tolls'],['Salinger','The Catcher in the Rye'],['Hawthorne','The Scarlet Letter']];
  const el=id=>document.getElementById(id);
  const lkeys=new Set(left.map(r=>r[0])),rkeys=new Set(right.map(r=>r[0]));
  const lmap=Object.fromEntries(left),rmap=Object.fromEntries(right);
  let how='inner';

  el('leftT').querySelector('tbody').innerHTML=left.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');
  el('rightT').querySelector('tbody').innerHTML=right.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');

  function order(){const seen=new Set(),o=[];left.forEach(r=>{seen.add(r[0]);o.push(r[0]);});right.forEach(r=>{if(!seen.has(r[0])){seen.add(r[0]);o.push(r[0]);}});return o;}
  function keysFor(h){return order().filter(a=>{const inL=lkeys.has(a),inR=rkeys.has(a);return h==='inner'?inL&&inR:h==='outer'?true:h==='left'?inL:inR;});}

  function render(){
    el('expr').innerHTML=`first_pupil_df.merge(second_pupil_df, on='author'`+(how==='inner'?'':`, <span class="p">how='${how}'</span>`)+`)`;
    const keys=keysFor(how);
    el('resT').querySelector('tbody').innerHTML=keys.map(a=>{
      const inL=lkeys.has(a),inR=rkeys.has(a);
      return `<tr><td>${a}</td><td class="${inL?'':'nan'}">${inL?lmap[a]:'NaN'}</td><td class="${inR?'':'nan'}">${inR?rmap[a]:'NaN'}</td></tr>`;
    }).join('');
    const nan=keys.reduce((n,a)=>n+(lkeys.has(a)?0:1)+(rkeys.has(a)?0:1),0);
    el('count').textContent=`${keys.length} row${keys.length===1?'':'s'}`+(nan?` · ${nan} NaN`:'');
    document.querySelectorAll('#seg button').forEach(b=>b.setAttribute('aria-pressed',b.dataset.how===how));
    el('status').textContent=`how='${how}' returns ${keys.length} rows: ${keys.join(', ')}.`;
  }
  document.querySelectorAll('#seg button').forEach(b=>b.addEventListener('click',()=>{how=b.dataset.how;render();}));
  el('reset').addEventListener('click',()=>{how='inner';render();});
  render();
})();
</script>
</body>
</html>
