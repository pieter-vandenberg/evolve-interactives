<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>List slicing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF5EC;--panel:#FFFDF8;--ink:#211C17;--ink-soft:#6E665A;
    --line:#E6DCC9;--line-strong:#D3C6AC;--accent:#BC4326;--accent-soft:#F4DDD2;
    --radius:14px;--mono:'IBM Plex Mono',ui-monospace,monospace;--sans:'DM Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:620px;margin:0 auto;padding:20px}
  .stage{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:0 1px 0 var(--line),0 14px 30px -22px rgba(33,28,23,.4)}

  /* controls first */
  .controls{display:grid;gap:16px;margin-bottom:24px}
  .ctrl label{display:flex;justify-content:space-between;align-items:baseline;font-weight:600;font-size:14px;margin-bottom:4px}
  .ctrl .val{font-family:var(--mono);color:var(--accent);font-size:16px;font-weight:600}
  .ctrl input[type=range]{width:100%;accent-color:var(--accent);height:28px;cursor:pointer}

  /* list visualization */
  .trackScroll{overflow-x:auto;padding-bottom:2px;margin:0 -2px}
  .track{display:flex;gap:9px;padding:0 2px;min-width:min-content;justify-content:center}
  .cell{flex:0 0 auto;width:92px;text-align:center}
  .idx{font-family:var(--mono);font-size:12px;color:var(--ink-soft);margin-bottom:6px}
  .box{font-family:var(--mono);font-size:14px;font-weight:500;border:1.5px solid var(--line-strong);border-radius:10px;padding:14px 6px;background:#fff;transition:transform .18s,background .18s,border-color .18s,opacity .18s;position:relative}
  .cell.sel .box{background:var(--ink);color:var(--paper);border-color:var(--ink);transform:translateY(-4px);font-weight:600}
  .cell.sel .box::after{content:"\2713";position:absolute;top:4px;right:6px;font-size:11px;color:var(--accent);font-weight:700}
  .cell.out .box{opacity:.4}
  .markers{display:flex;justify-content:center;gap:9px;margin-top:3px}
  .mcell{width:92px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;font-weight:600}
  .mStart{color:var(--accent)}.mStop{color:var(--ink-soft)}

  .out-row{margin-top:22px;text-align:center}
  .expr{font-family:var(--mono);font-size:clamp(16px,3.6vw,20px);font-weight:500;background:var(--accent-soft);color:var(--ink);display:inline-block;padding:8px 14px;border-radius:9px}
  .arrow{display:block;color:var(--ink-soft);font-size:18px;margin:8px 0 6px}
  .result{font-family:var(--mono);font-size:clamp(15px,3vw,18px);font-weight:600;color:var(--accent);min-height:1.4em}

  .reset{display:block;margin:22px auto 0;font-family:var(--sans);font-weight:600;font-size:13px;border:1.5px solid var(--line-strong);background:transparent;color:var(--ink-soft);border-radius:999px;padding:7px 16px;cursor:pointer;transition:.15s}
  .reset:hover{border-color:var(--ink);color:var(--ink)}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);border:0}
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:3px;border-radius:8px}
  @media (max-width:560px){.track,.markers{justify-content:flex-start}.cell,.mcell{width:78px}.box{font-size:12.5px}}
  @media (prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="sr-only">Interactive: list slicing. Use the start and stop sliders to choose a range of the list named checkpoints and see the new list it produces.</h1>
  <div class="stage">
    <!-- CONTROLS FIRST -->
    <div class="controls">
      <div class="ctrl">
        <label for="start">start <span class="val" id="startVal">1</span></label>
        <input type="range" id="start" min="0" max="5" value="1" step="1">
      </div>
      <div class="ctrl">
        <label for="stop">stop <span class="val" id="stopVal">4</span></label>
        <input type="range" id="stop" min="0" max="5" value="4" step="1">
      </div>
    </div>

    <!-- VISUALIZATION -->
    <div class="trackScroll">
      <div class="track" id="track" role="img" aria-label="The list checkpoints with five elements indexed 0 to 4."></div>
    </div>
    <div class="markers" id="markers" aria-hidden="true"></div>

    <div class="out-row">
      <span class="expr" id="expr">checkpoints[1:4]</span>
      <span class="arrow" aria-hidden="true">↓</span>
      <div class="result" id="result"></div>
    </div>

    <button class="reset" id="reset" type="button">Reset</button>
    <p class="sr-only" id="status" role="status" aria-live="polite"></p>
  </div>
</div>

<script>
(function(){
  const LIST=['wake','stretch','breakfast','work','walk'];
  const N=LIST.length;
  const el=id=>document.getElementById(id);
  const track=el('track'),markers=el('markers');

  LIST.forEach((w,i)=>{
    const c=document.createElement('div');c.className='cell';c.dataset.i=i;
    c.innerHTML=`<div class="idx">${i}</div><div class="box">'${w}'</div>`;
    track.appendChild(c);
    const m=document.createElement('div');m.className='mcell';
    m.innerHTML=`<span class="mStart" data-ms="${i}"></span><span class="mStop" data-me="${i}"></span>`;
    markers.appendChild(m);
  });

  const pyList=a=>'['+a.map(w=>`'${w}'`).join(', ')+']';

  function render(){
    const start=+el('start').value, stop=+el('stop').value;
    el('startVal').textContent=start;
    el('stopVal').textContent=stop;

    const kept=[];
    for(let i=start;i<stop;i++) if(i>=0&&i<N) kept.push(i);
    const keptSet=new Set(kept);

    track.querySelectorAll('.cell').forEach(c=>{
      const i=+c.dataset.i;c.classList.toggle('sel',keptSet.has(i));c.classList.toggle('out',!keptSet.has(i));
    });
    markers.querySelectorAll('span').forEach(s=>s.textContent='');
    const ms=markers.querySelector(`[data-ms="${start}"]`); if(ms&&start<N)ms.textContent='↑start';
    const me=markers.querySelector(`[data-me="${stop}"]`); if(me&&stop<N)me.textContent='stop↑';

    el('expr').textContent=`checkpoints[${start}:${stop}]`;
    const out=kept.map(i=>LIST[i]);
    el('result').textContent=pyList(out);
    el('status').textContent=`checkpoints[${start}:${stop}] gives ${out.length===0?'an empty list':pyList(out)}.`;
  }

  ['start','stop'].forEach(id=>el(id).addEventListener('input',render));
  el('reset').addEventListener('click',()=>{el('start').value=1;el('stop').value=4;render();});
  render();
})();
</script>
</body>
</html>
