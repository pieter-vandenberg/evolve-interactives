<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How precedence changes the answer · Interactive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=DM+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF5EC;--panel:#FFFDF8;--ink:#211C17;--ink-soft:#6E665A;
    --line:#E6DCC9;--line-strong:#D3C6AC;--accent:#BC4326;--accent-soft:#F4DDD2;
    --true:#2F6B4F;--true-soft:#DCEFE4;--false:#8A5A2B;--false-soft:#F1E4D2;
    --radius:14px;--mono:'IBM Plex Mono',ui-monospace,monospace;--sans:'DM Sans',system-ui,sans-serif;--disp:'Fraunces',Georgia,serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:32px 20px 48px}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:600;margin:0 0 6px}
  h1{font-family:var(--disp);font-weight:600;font-size:clamp(28px,5vw,40px);line-height:1.05;margin:0 0 10px;letter-spacing:-.01em}
  .lede{color:var(--ink-soft);font-size:16px;margin:0 0 26px;max-width:56ch}
  .lede code{font-family:var(--mono)}
  .stage{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:24px 22px 22px;box-shadow:0 1px 0 var(--line),0 14px 30px -22px rgba(33,28,23,.4)}

  .operands{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:22px}
  .operand{display:flex;flex-direction:column;align-items:center;gap:8px}
  .operand .nm{font-family:var(--mono);font-size:15px;font-weight:600}
  .tgl{font-family:var(--mono);font-weight:600;font-size:14px;border:1.5px solid var(--line-strong);background:#fff;border-radius:9px;padding:9px 16px;cursor:pointer;min-width:78px;transition:.15s}
  .tgl[data-v="true"]{background:var(--true-soft);border-color:var(--true);color:var(--true)}
  .tgl[data-v="false"]{background:var(--false-soft);border-color:var(--false);color:var(--false)}

  .parenRow{display:flex;justify-content:center;margin-bottom:22px}
  .parenToggle{display:inline-flex;align-items:center;gap:9px;font-size:14px;font-weight:500;border:1.5px solid var(--line-strong);background:#fff;border-radius:999px;padding:9px 16px;cursor:pointer;transition:.15s}
  .parenToggle.on{border-color:var(--accent);background:var(--accent-soft)}
  .parenToggle input{accent-color:var(--accent);width:15px;height:15px}
  .parenToggle code{font-family:var(--mono)}

  .expr{font-family:var(--mono);font-size:clamp(17px,3.6vw,22px);text-align:center;margin:6px 0 4px;font-weight:500}
  .expr .tok{padding:1px 4px;border-radius:5px}
  .expr .op{color:var(--accent);font-weight:600}
  .expr .grp{background:var(--accent-soft);border-radius:6px;padding:2px 6px}
  .hint{text-align:center;font-size:12.5px;color:var(--ink-soft);font-family:var(--mono);margin-bottom:20px}

  .steps{border-top:1px solid var(--line);padding-top:20px;display:grid;gap:12px}
  .stepRow{display:flex;align-items:center;gap:12px;font-family:var(--mono);font-size:14px}
  .stepRow .badge{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);min-width:64px}
  .stepRow .sub{flex:1}
  .chip{font-family:var(--mono);font-weight:700;font-size:13px;padding:3px 9px;border-radius:7px}
  .chip.t{background:var(--true-soft);color:var(--true)}
  .chip.f{background:var(--false-soft);color:var(--false)}

  .final{margin-top:22px;text-align:center}
  .final .resword{font-family:var(--disp);font-size:clamp(34px,7vw,52px);font-weight:600;line-height:1}
  .final .resword.t{color:var(--true)}
  .final .resword.f{color:var(--false)}
  .final .cap{font-size:13px;color:var(--ink-soft);margin-top:4px}

  .bar{display:flex;justify-content:flex-end;margin-top:22px;border-top:1px solid var(--line);padding-top:18px}
  .reset{font-family:var(--sans);font-weight:600;font-size:14px;border:1.5px solid var(--ink);background:transparent;color:var(--ink);border-radius:999px;padding:9px 18px;cursor:pointer;transition:.15s}
  .reset:hover{background:var(--ink);color:var(--paper)}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);border:0}
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:3px;border-radius:8px}
  @media (prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Python · Boolean logic</p>
  <h1>How precedence changes the answer</h1>
  <p class="lede">Python always evaluates <code>and</code> before <code>or</code>. That hidden order can flip a result you thought you understood. Flip the truth values, then add parentheses and watch the evaluation regroup.</p>

  <div class="stage">
    <div class="operands">
      <div class="operand"><span class="nm">A</span><button class="tgl" id="A" data-v="true" type="button" aria-pressed="true">True</button></div>
      <div class="operand"><span class="nm">B</span><button class="tgl" id="B" data-v="false" type="button" aria-pressed="false">False</button></div>
      <div class="operand"><span class="nm">C</span><button class="tgl" id="C" data-v="false" type="button" aria-pressed="false">False</button></div>
    </div>

    <div class="parenRow">
      <label class="parenToggle" id="pWrap">
        <input type="checkbox" id="paren">
        add parentheses → <code>(A or B) and C</code>
      </label>
    </div>

    <div class="expr" id="expr"></div>
    <div class="hint" id="hint"></div>

    <div class="steps" id="steps"></div>

    <div class="final">
      <div class="resword" id="resword">—</div>
      <div class="cap" id="cap"></div>
    </div>

    <div class="bar"><button class="reset" id="reset" type="button">Reset</button></div>
    <p class="sr-only" id="status" role="status" aria-live="polite"></p>
  </div>
</div>

<script>
(function(){
  const el=id=>document.getElementById(id);
  const state={A:true,B:false,C:false,paren:false};
  const tf=v=>v?'True':'False';
  const chip=v=>`<span class="chip ${v?'t':'f'}">${tf(v)}</span>`;

  function toggle(k){state[k]=!state[k];const b=el(k);b.dataset.v=state[k];b.textContent=tf(state[k]);b.setAttribute('aria-pressed',state[k]);render();}
  ['A','B','C'].forEach(k=>el(k).addEventListener('click',()=>toggle(k)));
  el('paren').addEventListener('change',e=>{state.paren=e.target.checked;el('pWrap').classList.toggle('on',state.paren);render();});
  el('reset').addEventListener('click',()=>{
    state.A=true;state.B=false;state.C=false;state.paren=false;
    ['A','B','C'].forEach(k=>{el(k).dataset.v=state[k];el(k).textContent=tf(state[k]);el(k).setAttribute('aria-pressed',state[k]);});
    el('paren').checked=false;el('pWrap').classList.remove('on');render();
  });

  function render(){
    const {A,B,C,paren}=state;
    let steps,result;
    if(!paren){
      // A or B and C  →  B and C first
      const bc=B&&C;
      result=A||bc;
      el('expr').innerHTML=`A <span class="tok op">or</span> <span class="grp">B <span class="op">and</span> C</span>`;
      el('hint').textContent='and binds tighter, so B and C is grouped first';
      steps=[
        {badge:'1 · and',sub:`B and C → ${tf(B)} and ${tf(C)}`,val:bc},
        {badge:'2 · or',sub:`A or (B and C) → ${tf(A)} or ${tf(bc)}`,val:result},
      ];
    }else{
      const ab=A||B;
      result=ab&&C;
      el('expr').innerHTML=`<span class="grp">A <span class="op">or</span> B</span> <span class="tok op">and</span> C`;
      el('hint').textContent='parentheses force A or B to be handled first';
      steps=[
        {badge:'1 · or',sub:`A or B → ${tf(A)} or ${tf(B)}`,val:ab},
        {badge:'2 · and',sub:`(A or B) and C → ${tf(ab)} and ${tf(C)}`,val:result},
      ];
    }
    el('steps').innerHTML=steps.map(s=>
      `<div class="stepRow"><span class="badge">${s.badge}</span><span class="sub">${s.sub}</span>${chip(s.val)}</div>`
    ).join('');
    el('resword').textContent=tf(result);
    el('resword').className='resword '+(result?'t':'f');
    el('cap').textContent=`with A=${tf(A)}, B=${tf(B)}, C=${tf(C)}`;
    el('status').textContent=`${paren?'(A or B) and C':'A or B and C'} with A ${tf(A)}, B ${tf(B)}, C ${tf(C)} evaluates to ${tf(result)}.`;
  }
  render();
})();
</script>
</body>
</html>
